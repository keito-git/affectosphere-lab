<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="55%" stop-color="#F4F0E8"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </linearGradient>
    <linearGradient id="amber-band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D49F4C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D49F4C" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D49F4C" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.12"/>
    </radialGradient>
  </defs>

  <!-- Base parchment -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Soft horizontal review-card guides -->
  <g stroke="#D4C5A3" stroke-width="0.6" fill="none" opacity="0.45">
    <line x1="120" y1="220" x2="1480" y2="220"/>
    <line x1="120" y1="450" x2="1480" y2="450"/>
    <line x1="120" y1="680" x2="1480" y2="680"/>
  </g>

  <!-- Amber band across the middle suggesting "the gap" -->
  <rect x="0" y="380" width="1600" height="160" fill="url(#amber-band)"/>

  <!-- Three customer-review style cards, each with same phrase shown twice (surface vs. intended) -->
  <g font-family="'Times New Roman', 'Noto Serif JP', serif" font-style="italic">
    <!-- Card 1: top -->
    <text x="180" y="180" font-size="34" fill="#6B6B66" opacity="0.85">"Brilliant handling."</text>
    <text x="180" y="260" font-size="26" fill="#7A5A2C" opacity="0.95">↳ intended: never returning</text>

    <!-- Card 2: middle (most prominent) -->
    <text x="180" y="410" font-size="40" fill="#2B2B28" opacity="0.95">"Thanks for the great service."</text>
    <text x="180" y="490" font-size="30" fill="#D49F4C" opacity="0.95">↳ intended: deep frustration</text>

    <!-- Card 3: bottom -->
    <text x="180" y="640" font-size="34" fill="#6B6B66" opacity="0.85">"Truly impressive response time."</text>
    <text x="180" y="720" font-size="26" fill="#7A5A2C" opacity="0.95">↳ intended: unacceptably slow</text>
  </g>

  <!-- Right side: small confidence-meter glyphs -->
  <g fill="none" stroke="#7A5A2C" stroke-width="2" opacity="0.7">
    <!-- meter 1 -->
    <rect x="1240" y="160" width="220" height="14" rx="7"/>
    <rect x="1240" y="160" width="180" height="14" rx="7" fill="#D49F4C" stroke="none" opacity="0.55"/>
    <!-- meter 2 (low confidence — the interesting one) -->
    <rect x="1240" y="390" width="220" height="14" rx="7"/>
    <rect x="1240" y="390" width="90" height="14" rx="7" fill="#D49F4C" stroke="none" opacity="0.55"/>
    <!-- meter 3 -->
    <rect x="1240" y="620" width="220" height="14" rx="7"/>
    <rect x="1240" y="620" width="150" height="14" rx="7" fill="#D49F4C" stroke="none" opacity="0.55"/>
  </g>

  <!-- Tiny labels next to meters -->
  <g font-family="'Times New Roman', 'Noto Serif JP', serif" font-size="16" fill="#6B6B66" opacity="0.8">
    <text x="1240" y="200">surface confidence</text>
    <text x="1240" y="430">honest hesitation</text>
    <text x="1240" y="660">surface confidence</text>
  </g>

  <!-- Subtle vignette -->
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
