<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="55%" stop-color="#F4F0E8"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </linearGradient>
    <linearGradient id="paper-shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EFE8D5"/>
    </linearGradient>
    <linearGradient id="amber-line" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#D49F4C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D49F4C" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#D49F4C" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#D49F4C" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#D49F4C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base parchment -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Atmospheric glow -->
  <ellipse cx="800" cy="450" rx="900" ry="380" fill="url(#spot)"/>

  <!-- Left side: stack of law books -->
  <g transform="translate(120, 380)">
    <!-- Bottom book -->
    <rect x="0" y="200" width="380" height="60" fill="#2B2B28" rx="3"/>
    <rect x="10" y="208" width="360" height="44" fill="#3A3A33" rx="2"/>
    <line x1="20" y1="230" x2="160" y2="230" stroke="#D49F4C" stroke-width="2"/>
    <!-- Middle book -->
    <rect x="20" y="130" width="360" height="70" fill="#4A3A28" rx="3"/>
    <rect x="30" y="138" width="340" height="54" fill="#5A4632" rx="2"/>
    <line x1="40" y1="165" x2="200" y2="165" stroke="#D49F4C" stroke-width="2"/>
    <!-- Top book -->
    <rect x="40" y="50" width="340" height="80" fill="#2B2B28" rx="3"/>
    <rect x="50" y="58" width="320" height="64" fill="#3A3A33" rx="2"/>
    <text x="70" y="100" font-family="'Times New Roman', serif" font-size="22" fill="#D49F4C" font-style="italic">CIVIL CODE</text>
  </g>

  <!-- Center: exam paper -->
  <g transform="translate(600, 180)">
    <rect x="0" y="0" width="400" height="540" fill="url(#paper-shade)" stroke="#C8B894" stroke-width="1.5" rx="4"/>
    <!-- Header -->
    <text x="200" y="50" font-family="'Times New Roman', serif" font-size="20" fill="#2B2B28" text-anchor="middle" font-style="italic">RETSE Exam</text>
    <line x1="40" y1="70" x2="360" y2="70" stroke="#2B2B28" stroke-width="0.8"/>

    <!-- Question lines -->
    <g stroke="#8A7D5E" stroke-width="0.6" opacity="0.7">
      <line x1="40" y1="110" x2="360" y2="110"/>
      <line x1="40" y1="140" x2="320" y2="140"/>
      <line x1="40" y1="170" x2="340" y2="170"/>
      <line x1="40" y1="220" x2="360" y2="220"/>
      <line x1="40" y1="250" x2="300" y2="250"/>
      <line x1="40" y1="280" x2="340" y2="280"/>
      <line x1="40" y1="330" x2="360" y2="330"/>
      <line x1="40" y1="360" x2="320" y2="360"/>
      <line x1="40" y1="410" x2="360" y2="410"/>
      <line x1="40" y1="440" x2="280" y2="440"/>
    </g>

    <!-- Score marks -->
    <text x="350" y="155" font-family="serif" font-size="28" fill="#2B2B28" text-anchor="middle">✓</text>
    <text x="350" y="265" font-family="serif" font-size="28" fill="#2B2B28" text-anchor="middle">✓</text>
    <text x="350" y="345" font-family="serif" font-size="28" fill="#A04A2C" text-anchor="middle">✗</text>
    <text x="350" y="425" font-family="serif" font-size="28" fill="#A04A2C" text-anchor="middle">✗</text>

    <!-- Passing line -->
    <line x1="-20" y1="490" x2="420" y2="490" stroke="url(#amber-line)" stroke-width="3" stroke-dasharray="8 4"/>
    <text x="420" y="495" font-family="'Times New Roman', serif" font-size="16" fill="#7A5A2C" font-style="italic">passing line</text>
  </g>

  <!-- Right side: balance scale -->
  <g transform="translate(1180, 320)" stroke="#2B2B28" stroke-width="2.5" fill="none">
    <!-- Stand -->
    <line x1="150" y1="100" x2="150" y2="360"/>
    <ellipse cx="150" cy="370" rx="80" ry="10" fill="#2B2B28"/>
    <!-- Beam (slightly tilted: AI side lower) -->
    <line x1="40" y1="120" x2="260" y2="80"/>
    <!-- Left pan (Human / heavier) -->
    <line x1="60" y1="120" x2="60" y2="180"/>
    <path d="M 20 180 Q 60 215 100 180" fill="#F4F0E8" stroke="#2B2B28" stroke-width="2"/>
    <text x="60" y="155" font-family="'Times New Roman', serif" font-size="14" fill="#2B2B28" text-anchor="middle" stroke="none">HUMAN</text>
    <!-- Right pan (AI / lighter, raised) -->
    <line x1="240" y1="80" x2="240" y2="140"/>
    <path d="M 200 140 Q 240 170 280 140" fill="#FAFAF7" stroke="#D49F4C" stroke-width="2"/>
    <text x="240" y="115" font-family="'Times New Roman', serif" font-size="14" fill="#7A5A2C" text-anchor="middle" stroke="none">AI</text>
    <!-- Pivot -->
    <circle cx="150" cy="100" r="6" fill="#D49F4C" stroke="none"/>
  </g>

  <!-- Bottom caption strip -->
  <g font-family="'Times New Roman', 'Noto Serif JP', serif" fill="#2B2B28" opacity="0.7">
    <text x="800" y="830" font-size="20" text-anchor="middle" font-style="italic">GPT-4 &gt; GPT-3.5  ·  yet neither crosses the passing line</text>
  </g>

  <!-- Vignette -->
  <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.12"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
