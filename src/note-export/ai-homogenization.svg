<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="55%" stop-color="#F4F0E8"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#D49F4C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D49F4C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g stroke="#D4C5A3" stroke-width="0.6" fill="none" opacity="0.5">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
  </g>

  <!-- Grid of essay rectangles (uniform = homogenized) with one unique outlier -->
  <g stroke="#8a8a82" stroke-width="1" fill="#F4F0E8" opacity="0.55">
    <rect x="200" y="180" width="170" height="220" rx="2"/>
    <rect x="400" y="180" width="170" height="220" rx="2"/>
    <rect x="600" y="180" width="170" height="220" rx="2"/>
    <rect x="800" y="180" width="170" height="220" rx="2"/>
    <rect x="1000" y="180" width="170" height="220" rx="2"/>
    <rect x="1200" y="180" width="170" height="220" rx="2"/>
    <rect x="200" y="500" width="170" height="220" rx="2"/>
    <rect x="400" y="500" width="170" height="220" rx="2"/>
    <rect x="800" y="500" width="170" height="220" rx="2"/>
    <rect x="1000" y="500" width="170" height="220" rx="2"/>
    <rect x="1200" y="500" width="170" height="220" rx="2"/>
  </g>
  <!-- Lines inside each "essay" -->
  <g stroke="#6B6B66" stroke-width="0.6" opacity="0.4">
    <line x1="215" y1="210" x2="355" y2="210"/>
    <line x1="215" y1="230" x2="345" y2="230"/>
    <line x1="215" y1="250" x2="355" y2="250"/>
    <line x1="415" y1="210" x2="555" y2="210"/>
    <line x1="415" y1="230" x2="545" y2="230"/>
    <line x1="615" y1="210" x2="755" y2="210"/>
    <line x1="815" y1="210" x2="955" y2="210"/>
    <line x1="1015" y1="210" x2="1155" y2="210"/>
    <line x1="1215" y1="210" x2="1355" y2="210"/>
    <line x1="215" y1="530" x2="355" y2="530"/>
    <line x1="415" y1="530" x2="555" y2="530"/>
    <line x1="815" y1="530" x2="955" y2="530"/>
    <line x1="1015" y1="530" x2="1155" y2="530"/>
    <line x1="1215" y1="530" x2="1355" y2="530"/>
  </g>

  <!-- The amber outlier essay — uniquely written -->
  <ellipse cx="685" cy="610" rx="280" ry="170" fill="url(#spot)"/>
  <rect x="600" y="500" width="170" height="220" rx="2" stroke="#7A5A2C" stroke-width="2" fill="#FAFAF7" opacity="0.95"/>
  <g stroke="#7A5A2C" stroke-width="1" opacity="0.9">
    <line x1="615" y1="530" x2="755" y2="530"/>
    <line x1="615" y1="555" x2="745" y2="555"/>
    <line x1="615" y1="580" x2="755" y2="580"/>
    <line x1="615" y1="605" x2="735" y2="605"/>
    <line x1="615" y1="635" x2="755" y2="635"/>
    <line x1="615" y1="660" x2="745" y2="660"/>
    <line x1="615" y1="685" x2="755" y2="685"/>
  </g>
  <text x="685" y="780" font-family="Times New Roman, serif" font-size="22" font-style="italic" fill="#7A5A2C" text-anchor="middle">an original argument</text>

  <!-- Faint headings -->
  <text x="800" y="100" font-family="Times New Roman, serif" font-size="32" font-style="italic" fill="#6B6B66" text-anchor="middle" opacity="0.7">AI-augmented essays at scale</text>
</svg>
