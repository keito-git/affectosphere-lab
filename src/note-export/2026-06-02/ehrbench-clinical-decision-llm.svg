<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Background: warm cream -->
  <rect width="1600" height="900" fill="#F8F4EE"/>

  <defs>
    <pattern id="gridlines" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#E8E2D6" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="benchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A76A;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#D4A76A;stop-opacity:0.04"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#gridlines)"/>

  <!-- Central EHR icon -->
  <!-- Folder shape -->
  <rect x="680" y="180" width="240" height="280" rx="12" fill="#EDE8DC" stroke="#D4A76A" stroke-width="2" opacity="0.8"/>
  <rect x="680" y="160" width="120" height="30" rx="8" fill="#D4A76A" opacity="0.5"/>
  <!-- Lines inside folder -->
  <line x1="710" y1="250" x2="890" y2="250" stroke="#3D3830" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="710" y1="280" x2="890" y2="280" stroke="#3D3830" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="710" y1="310" x2="850" y2="310" stroke="#3D3830" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="710" y1="340" x2="870" y2="340" stroke="#3D3830" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="710" y1="370" x2="830" y2="370" stroke="#3D3830" stroke-width="2" stroke-opacity="0.35"/>
  <text x="800" y="430" font-family="Georgia, serif" font-size="20" fill="#3D3830" opacity="0.65" text-anchor="middle">EHR Data</text>

  <!-- Radiating lines to 3 task areas -->
  <!-- Line to Diagnosis (left) -->
  <line x1="680" y1="320" x2="340" y2="480" stroke="#D4A76A" stroke-width="2" stroke-dasharray="8,5" opacity="0.55"/>
  <!-- Line to Treatment (bottom) -->
  <line x1="800" y1="460" x2="800" y2="600" stroke="#D4A76A" stroke-width="2" stroke-dasharray="8,5" opacity="0.55"/>
  <!-- Line to Prognosis (right) -->
  <line x1="920" y1="320" x2="1260" y2="480" stroke="#D4A76A" stroke-width="2" stroke-dasharray="8,5" opacity="0.55"/>

  <!-- Diagnosis box (left) -->
  <rect x="140" y="470" width="340" height="120" rx="14" fill="#EDE8DC" stroke="#D4A76A" stroke-width="1.5" opacity="0.75"/>
  <text x="310" y="510" font-family="Georgia, serif" font-size="22" fill="#3D3830" opacity="0.75" text-anchor="middle">Diagnosis</text>
  <text x="310" y="540" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.5" text-anchor="middle">Symptoms + Labs → Dx</text>
  <text x="310" y="570" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.4" text-anchor="middle">Task Type 1 / 3</text>

  <!-- Treatment box (bottom center) -->
  <rect x="590" y="610" width="420" height="120" rx="14" fill="#EDE8DC" stroke="#D4A76A" stroke-width="1.5" opacity="0.75"/>
  <text x="800" y="650" font-family="Georgia, serif" font-size="22" fill="#3D3830" opacity="0.75" text-anchor="middle">Treatment Selection</text>
  <text x="800" y="680" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.5" text-anchor="middle">Diagnosis → Optimal Tx</text>
  <text x="800" y="710" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.4" text-anchor="middle">Task Type 2 / 3</text>

  <!-- Prognosis box (right) -->
  <rect x="1120" y="470" width="340" height="120" rx="14" fill="#EDE8DC" stroke="#D4A76A" stroke-width="1.5" opacity="0.75"/>
  <text x="1290" y="510" font-family="Georgia, serif" font-size="22" fill="#3D3830" opacity="0.75" text-anchor="middle">Prognosis</text>
  <text x="1290" y="540" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.5" text-anchor="middle">Current State → Outcomes</text>
  <text x="1290" y="570" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.4" text-anchor="middle">Task Type 3 / 3</text>

  <!-- Model evaluation row at bottom -->
  <text x="800" y="780" font-family="Georgia, serif" font-size="18" fill="#3D3830" opacity="0.5" text-anchor="middle">30+ LLMs evaluated across all tasks</text>

  <!-- Small model dots row -->
  <g opacity="0.45">
    <circle cx="340" cy="810" r="10" fill="#3D3830"/>
    <circle cx="380" cy="810" r="10" fill="#3D3830"/>
    <circle cx="420" cy="810" r="10" fill="#3D3830"/>
    <circle cx="460" cy="810" r="10" fill="#D4A76A"/>
    <circle cx="500" cy="810" r="10" fill="#3D3830"/>
    <circle cx="540" cy="810" r="10" fill="#3D3830"/>
    <circle cx="580" cy="810" r="10" fill="#D4A76A"/>
    <circle cx="620" cy="810" r="10" fill="#3D3830"/>
    <circle cx="660" cy="810" r="10" fill="#3D3830"/>
    <circle cx="700" cy="810" r="10" fill="#3D3830"/>
    <circle cx="740" cy="810" r="10" fill="#D4A76A"/>
    <circle cx="780" cy="810" r="10" fill="#3D3830"/>
    <circle cx="820" cy="810" r="10" fill="#3D3830"/>
    <circle cx="860" cy="810" r="10" fill="#3D3830"/>
    <circle cx="900" cy="810" r="10" fill="#D4A76A"/>
    <circle cx="940" cy="810" r="10" fill="#3D3830"/>
    <circle cx="980" cy="810" r="10" fill="#3D3830"/>
    <circle cx="1020" cy="810" r="10" fill="#D4A76A"/>
    <circle cx="1060" cy="810" r="10" fill="#3D3830"/>
    <circle cx="1100" cy="810" r="10" fill="#3D3830"/>
    <circle cx="1140" cy="810" r="10" fill="#3D3830"/>
    <circle cx="1180" cy="810" r="10" fill="#D4A76A"/>
    <circle cx="1220" cy="810" r="10" fill="#3D3830"/>
    <circle cx="1260" cy="810" r="10" fill="#3D3830"/>
  </g>

  <!-- Title -->
  <text x="800" y="80" font-family="Georgia, serif" font-size="30" fill="#3D3830" opacity="0.45" text-anchor="middle" letter-spacing="3">EHR · BENCH · CLINICAL AI</text>

  <!-- Decorative corners -->
  <path d="M 60 60 L 140 60 L 140 100" fill="none" stroke="#D4A76A" stroke-width="2" opacity="0.4"/>
  <path d="M 1540 840 L 1460 840 L 1460 800" fill="none" stroke="#D4A76A" stroke-width="2" opacity="0.4"/>
</svg>
