<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Background: warm ivory -->
  <rect width="1600" height="900" fill="#FDFAF4"/>

  <defs>
    <pattern id="hatch" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="40" x2="40" y2="0" stroke="#EDE8DC" stroke-width="0.7" opacity="0.7"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#hatch)"/>

  <!-- Left panel: Chat UI area -->
  <rect x="60" y="100" width="560" height="700" rx="20" fill="#F5EFE0" stroke="#D4A76A" stroke-width="1.5" opacity="0.6"/>
  <text x="340" y="150" font-family="Georgia, serif" font-size="22" fill="#3D3830" opacity="0.65" text-anchor="middle">Conversational UI</text>

  <!-- Chat bubbles left panel -->
  <!-- User bubble -->
  <rect x="120" y="185" width="300" height="52" rx="18" fill="#D4A76A" opacity="0.5"/>
  <text x="270" y="216" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.8" text-anchor="middle">What were today's alerts?</text>

  <!-- AI bubble -->
  <rect x="140" y="258" width="400" height="70" rx="18" fill="#EDE8DC" opacity="0.85"/>
  <text x="340" y="284" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.75" text-anchor="middle">3 production alerts detected.</text>
  <text x="340" y="308" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.75" text-anchor="middle">Line B: +12% downtime, 08:30–10:00.</text>

  <!-- User bubble 2 -->
  <rect x="120" y="352" width="240" height="52" rx="18" fill="#D4A76A" opacity="0.4"/>
  <text x="240" y="382" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.8" text-anchor="middle">Show inventory for Part X</text>

  <!-- AI bubble 2 -->
  <rect x="140" y="424" width="380" height="52" rx="18" fill="#EDE8DC" opacity="0.8"/>
  <text x="330" y="456" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.75" text-anchor="middle">Part X: 1,240 units. Reorder threshold: 800.</text>

  <!-- Cognitive load indicator (low) -->
  <text x="340" y="590" font-family="Georgia, serif" font-size="16" fill="#3D3830" opacity="0.55" text-anchor="middle">Cognitive Load</text>
  <rect x="175" y="605" width="330" height="18" rx="8" fill="#EDE8DC" opacity="0.6"/>
  <rect x="175" y="605" width="120" height="18" rx="8" fill="#D4A76A" opacity="0.7"/>
  <text x="340" y="645" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.5" text-anchor="middle">Low (simple tasks)</text>

  <!-- Right panel: Dashboard area -->
  <rect x="980" y="100" width="560" height="700" rx="20" fill="#ECEAE4" stroke="#3D3830" stroke-width="1.2" opacity="0.45"/>
  <text x="1260" y="150" font-family="Georgia, serif" font-size="22" fill="#3D3830" opacity="0.65" text-anchor="middle">Graphical Dashboard</text>

  <!-- Mini chart 1: bar chart -->
  <rect x="1020" y="180" width="220" height="130" rx="8" fill="#F5F2EC" stroke="#3D3830" stroke-width="0.8" opacity="0.4"/>
  <rect x="1040" y="270" width="25" height="30" fill="#3D3830" opacity="0.35"/>
  <rect x="1075" y="245" width="25" height="55" fill="#3D3830" opacity="0.45"/>
  <rect x="1110" y="230" width="25" height="70" fill="#3D3830" opacity="0.55"/>
  <rect x="1145" y="215" width="25" height="85" fill="#D4A76A" opacity="0.65"/>
  <rect x="1180" y="255" width="25" height="45" fill="#3D3830" opacity="0.4"/>

  <!-- Mini chart 2: line chart -->
  <rect x="1260" y="180" width="240" height="130" rx="8" fill="#F5F2EC" stroke="#3D3830" stroke-width="0.8" opacity="0.4"/>
  <polyline points="1280,275 1310,255 1340,265 1370,240 1400,250 1430,230 1460,242 1480,235" fill="none" stroke="#D4A76A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- KPI boxes -->
  <rect x="1020" y="335" width="120" height="70" rx="8" fill="#F5F2EC" stroke="#3D3830" stroke-width="0.8" opacity="0.4"/>
  <text x="1080" y="365" font-family="Georgia, serif" font-size="28" fill="#3D3830" opacity="0.65" text-anchor="middle">94%</text>
  <text x="1080" y="392" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.5" text-anchor="middle">Uptime</text>

  <rect x="1155" y="335" width="120" height="70" rx="8" fill="#F5F2EC" stroke="#3D3830" stroke-width="0.8" opacity="0.4"/>
  <text x="1215" y="365" font-family="Georgia, serif" font-size="28" fill="#D4A76A" opacity="0.75" text-anchor="middle">3</text>
  <text x="1215" y="392" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.5" text-anchor="middle">Alerts</text>

  <rect x="1290" y="335" width="120" height="70" rx="8" fill="#F5F2EC" stroke="#3D3830" stroke-width="0.8" opacity="0.4"/>
  <text x="1350" y="365" font-family="Georgia, serif" font-size="28" fill="#3D3830" opacity="0.65" text-anchor="middle">1.2k</text>
  <text x="1350" y="392" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.5" text-anchor="middle">Units</text>

  <!-- Cognitive load indicator (higher for complex) -->
  <text x="1260" y="590" font-family="Georgia, serif" font-size="16" fill="#3D3830" opacity="0.55" text-anchor="middle">Cognitive Load</text>
  <rect x="1065" y="605" width="390" height="18" rx="8" fill="#EDE8DC" opacity="0.6"/>
  <rect x="1065" y="605" width="280" height="18" rx="8" fill="#3D3830" opacity="0.35"/>
  <text x="1260" y="645" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.5" text-anchor="middle">Higher, but excels at multi-variable overview</text>

  <!-- Center: balance and equal sign -->
  <text x="800" y="440" font-family="Georgia, serif" font-size="80" fill="#3D3830" opacity="0.2" text-anchor="middle">=</text>
  <text x="800" y="510" font-family="Georgia, serif" font-size="18" fill="#3D3830" opacity="0.45" text-anchor="middle">Decision Accuracy</text>
  <text x="800" y="534" font-family="Georgia, serif" font-size="16" fill="#3D3830" opacity="0.35" text-anchor="middle">(no significant difference)</text>

  <!-- Arrow indicators -->
  <line x1="640" y1="450" x2="730" y2="450" stroke="#D4A76A" stroke-width="2" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="870" y1="450" x2="960" y2="450" stroke="#D4A76A" stroke-width="2" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- Title -->
  <text x="800" y="72" font-family="Georgia, serif" font-size="28" fill="#3D3830" opacity="0.45" text-anchor="middle" letter-spacing="3">CONVERSATION vs. VISUALIZATION</text>

  <!-- Decorative corners -->
  <path d="M 60 60 L 120 60 L 120 100" fill="none" stroke="#D4A76A" stroke-width="2" opacity="0.45"/>
  <path d="M 1540 840 L 1480 840 L 1480 800" fill="none" stroke="#D4A76A" stroke-width="2" opacity="0.45"/>
</svg>
