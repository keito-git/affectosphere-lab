<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="55%" stop-color="#F4F0E8"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </linearGradient>
    <linearGradient id="layer-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F4F0E8" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="layer-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F0E8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E8DCC4" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="layer-bot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8DCC4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D4C5A3" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="spine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#D49F4C" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#D49F4C" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7A5A2C" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Base parchment -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Faint grid -->
  <g stroke="#D4C5A3" stroke-width="0.5" fill="none" opacity="0.35">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>

  <!-- Three horizontal layers (control points) -->
  <g>
    <rect x="240" y="160" width="1120" height="170" rx="8" fill="url(#layer-top)" stroke="#7A5A2C" stroke-width="1.6" opacity="0.92"/>
    <rect x="240" y="365" width="1120" height="170" rx="8" fill="url(#layer-mid)" stroke="#7A5A2C" stroke-width="1.6" opacity="0.92"/>
    <rect x="240" y="570" width="1120" height="170" rx="8" fill="url(#layer-bot)" stroke="#7A5A2C" stroke-width="1.6" opacity="0.92"/>
  </g>

  <!-- Vertical amber accountability spine -->
  <rect x="794" y="120" width="12" height="660" fill="url(#spine)" rx="4"/>
  <!-- Spine node circles at each layer -->
  <circle cx="800" cy="245" r="18" fill="#D49F4C" stroke="#7A5A2C" stroke-width="2"/>
  <circle cx="800" cy="450" r="18" fill="#D49F4C" stroke="#7A5A2C" stroke-width="2"/>
  <circle cx="800" cy="655" r="18" fill="#D49F4C" stroke="#7A5A2C" stroke-width="2"/>
  <circle cx="800" cy="245" r="6" fill="#FAFAF7"/>
  <circle cx="800" cy="450" r="6" fill="#FAFAF7"/>
  <circle cx="800" cy="655" r="6" fill="#FAFAF7"/>

  <!-- Spine top + bottom caps -->
  <polygon points="780,120 820,120 800,90" fill="#7A5A2C"/>
  <polygon points="780,780 820,780 800,810" fill="#7A5A2C"/>

  <!-- Labels per layer (left side: title; right side: short desc) -->
  <g font-family="'Times New Roman', 'Noto Serif JP', serif" fill="#2B2B28">
    <!-- Layer 1: Data governance -->
    <text x="280" y="220" font-size="30" font-style="italic" fill="#7A5A2C">Data Governance</text>
    <text x="280" y="260" font-size="20" fill="#6B6B66" opacity="0.85">what is learned · what is fed in · where it goes</text>
    <text x="280" y="295" font-size="16" fill="#6B6B66" opacity="0.6">データガバナンス</text>

    <!-- Layer 2: Model selection -->
    <text x="280" y="425" font-size="30" font-style="italic" fill="#7A5A2C">Model Selection Control</text>
    <text x="280" y="465" font-size="20" fill="#6B6B66" opacity="0.85">which LLM for which task · vendor terms · versioning</text>
    <text x="280" y="500" font-size="16" fill="#6B6B66" opacity="0.6">モデル選定統制</text>

    <!-- Layer 3: Output review -->
    <text x="280" y="630" font-size="30" font-style="italic" fill="#7A5A2C">Output Review</text>
    <text x="280" y="670" font-size="20" fill="#6B6B66" opacity="0.85">who confirms · on what criteria · review records</text>
    <text x="280" y="705" font-size="16" fill="#6B6B66" opacity="0.6">出力レビュー</text>

    <!-- Right-side stakeholders -->
    <text x="900" y="220" font-size="20" fill="#6B6B66" opacity="0.8" font-style="italic">→ IT · legal · business units</text>
    <text x="900" y="425" font-size="20" fill="#6B6B66" opacity="0.8" font-style="italic">→ AI governance committee</text>
    <text x="900" y="630" font-size="20" fill="#6B6B66" opacity="0.8" font-style="italic">→ human reviewer · audit log</text>

    <!-- Top header -->
    <text x="800" y="70" font-size="28" font-style="italic" fill="#7A5A2C" text-anchor="middle" opacity="0.9">Three control points the C-suite must hold</text>

    <!-- Bottom: the spine = accountability -->
    <text x="800" y="855" font-size="20" fill="#7A5A2C" text-anchor="middle" opacity="0.85" font-style="italic">a single chain of accountability</text>
  </g>

  <!-- Faint side annotations -->
  <g font-family="'Times New Roman', 'Noto Serif JP', serif" fill="#7A5A2C" opacity="0.45" font-style="italic">
    <text x="80" y="225" font-size="18">EU AI Act</text>
    <text x="80" y="450" font-size="18">NIST AI RMF</text>
    <text x="80" y="675" font-size="18">METI Guidelines</text>
    <text x="1400" y="225" font-size="18">trust</text>
    <text x="1400" y="450" font-size="18">ESG</text>
    <text x="1400" y="675" font-size="18">audit</text>
  </g>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.12"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
