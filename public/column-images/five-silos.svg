<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="55%" stop-color="#F4F0E8"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </linearGradient>
    <linearGradient id="layer-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4F0E8"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D49F4C" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7A5A2C" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.78">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.12"/>
    </radialGradient>
  </defs>

  <!-- Base parchment -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Subtle vertical grid -->
  <g stroke="#D4C5A3" stroke-width="0.5" fill="none" opacity="0.45">
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>

  <!-- Six stacked layers (slightly offset for parallax feel) -->
  <!-- Layer 1: Ethics / Evaluation (top) -->
  <g>
    <rect x="280" y="80" width="1040" height="100" rx="10" fill="url(#layer-amber)" stroke="#7A5A2C" stroke-width="1.2" opacity="0.95"/>
    <text x="320" y="140" font-family="'Times New Roman', 'Noto Serif JP', serif" font-style="italic" font-size="30" fill="#2B2B28">Ethics / Evaluation</text>
    <text x="1220" y="140" font-family="'Helvetica Neue', sans-serif" font-size="22" fill="#6B6B66" text-anchor="end">6</text>
  </g>

  <!-- Layer 2: Social Application -->
  <g>
    <rect x="260" y="210" width="1080" height="100" rx="10" fill="url(#layer-amber)" stroke="#7A5A2C" stroke-width="1.2" opacity="0.95"/>
    <text x="300" y="270" font-family="'Times New Roman', 'Noto Serif JP', serif" font-style="italic" font-size="30" fill="#2B2B28">Social Application</text>
    <text x="1240" y="270" font-family="'Helvetica Neue', sans-serif" font-size="22" fill="#6B6B66" text-anchor="end">5</text>
  </g>

  <!-- Layer 3: Dialogue -->
  <g>
    <rect x="240" y="340" width="1120" height="100" rx="10" fill="url(#layer-amber)" stroke="#7A5A2C" stroke-width="1.2" opacity="0.95"/>
    <text x="280" y="400" font-family="'Times New Roman', 'Noto Serif JP', serif" font-style="italic" font-size="30" fill="#2B2B28">Dialogue</text>
    <text x="1260" y="400" font-family="'Helvetica Neue', sans-serif" font-size="22" fill="#6B6B66" text-anchor="end">4</text>
  </g>

  <!-- Layer 4: Model -->
  <g>
    <rect x="220" y="470" width="1160" height="100" rx="10" fill="url(#layer-amber)" stroke="#7A5A2C" stroke-width="1.2" opacity="0.95"/>
    <text x="260" y="530" font-family="'Times New Roman', 'Noto Serif JP', serif" font-style="italic" font-size="30" fill="#2B2B28">Model</text>
    <text x="1280" y="530" font-family="'Helvetica Neue', sans-serif" font-size="22" fill="#6B6B66" text-anchor="end">3</text>
  </g>

  <!-- Layer 5: Data -->
  <g>
    <rect x="200" y="600" width="1200" height="100" rx="10" fill="url(#layer-amber)" stroke="#7A5A2C" stroke-width="1.2" opacity="0.95"/>
    <text x="240" y="660" font-family="'Times New Roman', 'Noto Serif JP', serif" font-style="italic" font-size="30" fill="#2B2B28">Data</text>
    <text x="1300" y="660" font-family="'Helvetica Neue', sans-serif" font-size="22" fill="#6B6B66" text-anchor="end">2</text>
  </g>

  <!-- Layer 6: Theory (bottom / foundation) -->
  <g>
    <rect x="180" y="730" width="1240" height="100" rx="10" fill="url(#layer-amber)" stroke="#7A5A2C" stroke-width="1.4" opacity="0.95"/>
    <text x="220" y="790" font-family="'Times New Roman', 'Noto Serif JP', serif" font-style="italic" font-size="30" fill="#2B2B28">Theory</text>
    <text x="1320" y="790" font-family="'Helvetica Neue', sans-serif" font-size="22" fill="#6B6B66" text-anchor="end">1</text>
  </g>

  <!-- Amber bridges between layers (four bridge positions, on alternating sides) -->
  <!-- Bridge: theory <-> data (left) -->
  <rect x="220" y="700" width="60" height="30" rx="6" fill="url(#bridge)"/>
  <!-- Bridge: data <-> model (right) -->
  <rect x="1320" y="570" width="60" height="30" rx="6" fill="url(#bridge)"/>
  <!-- Bridge: model <-> dialogue (left) -->
  <rect x="260" y="440" width="60" height="30" rx="6" fill="url(#bridge)"/>
  <!-- Bridge: dialogue <-> social application (right) -->
  <rect x="1280" y="310" width="60" height="30" rx="6" fill="url(#bridge)"/>
  <!-- Bridge: social application <-> ethics (left) -->
  <rect x="300" y="180" width="60" height="30" rx="6" fill="url(#bridge)"/>

  <!-- Diagonal amber lines suggesting "bridge" beams across the layers -->
  <g stroke="#D49F4C" stroke-width="2" opacity="0.55">
    <line x1="250" y1="700" x2="250" y2="180"/>
    <line x1="1350" y1="600" x2="1350" y2="310"/>
  </g>

  <!-- Subtle caption strip -->
  <g font-family="'Times New Roman', 'Noto Serif JP', serif" font-style="italic" fill="#2B2B28" opacity="0.45" font-size="22">
    <text x="180" y="870">six layers — four bridges — five design criteria</text>
  </g>

  <!-- Vignette focus -->
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
