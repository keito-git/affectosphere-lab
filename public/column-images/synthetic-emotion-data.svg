<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="55%" stop-color="#F4F0E8"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </linearGradient>
    <radialGradient id="cluster-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#D49F4C" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D49F4C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.12"/>
    </radialGradient>
  </defs>

  <!-- Base parchment -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Faint coordinate grid (embedding space feeling) -->
  <g stroke="#D4C5A3" stroke-width="0.5" fill="none" opacity="0.4">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
    <line x1="320" y1="0" x2="320" y2="900"/>
    <line x1="640" y1="0" x2="640" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
  </g>

  <!-- Three cluster glows -->
  <ellipse cx="430" cy="330" rx="280" ry="180" fill="url(#cluster-glow)"/>
  <ellipse cx="1180" cy="420" rx="300" ry="190" fill="url(#cluster-glow)"/>
  <ellipse cx="780" cy="660" rx="260" ry="170" fill="url(#cluster-glow)"/>

  <!-- Faint human silhouettes (very subtle) -->
  <g fill="#7A5A2C" opacity="0.08">
    <!-- silhouette 1 -->
    <circle cx="430" cy="280" r="38"/>
    <path d="M 360 460 Q 360 360 430 360 Q 500 360 500 460 Z"/>
    <!-- silhouette 2 -->
    <circle cx="1180" cy="370" r="38"/>
    <path d="M 1110 550 Q 1110 450 1180 450 Q 1250 450 1250 550 Z"/>
    <!-- silhouette 3 -->
    <circle cx="780" cy="610" r="38"/>
    <path d="M 710 790 Q 710 690 780 690 Q 850 690 850 790 Z"/>
  </g>

  <!-- Real data points (charcoal, scattered) -->
  <g fill="#2B2B28" opacity="0.7">
    <!-- cluster 1 reals -->
    <circle cx="370" cy="310" r="5"/>
    <circle cx="420" cy="290" r="5"/>
    <circle cx="460" cy="340" r="5"/>
    <circle cx="400" cy="370" r="5"/>
    <circle cx="490" cy="310" r="5"/>
    <circle cx="350" cy="360" r="5"/>
    <!-- cluster 2 reals -->
    <circle cx="1120" cy="390" r="5"/>
    <circle cx="1170" cy="410" r="5"/>
    <circle cx="1220" cy="380" r="5"/>
    <circle cx="1190" cy="450" r="5"/>
    <circle cx="1140" cy="450" r="5"/>
    <!-- cluster 3 reals (sparse minority) -->
    <circle cx="760" cy="640" r="5"/>
    <circle cx="800" cy="670" r="5"/>
    <circle cx="780" cy="700" r="5"/>
  </g>

  <!-- Synthetic data points (amber, filling gaps and extending peripheries) -->
  <g fill="#D49F4C" opacity="0.85">
    <!-- cluster 1 synthetic fillers -->
    <circle cx="395" cy="335" r="4"/>
    <circle cx="445" cy="320" r="4"/>
    <circle cx="430" cy="380" r="4"/>
    <circle cx="380" cy="395" r="4"/>
    <circle cx="510" cy="370" r="4"/>
    <circle cx="320" cy="320" r="4"/>
    <!-- cluster 2 synthetic fillers -->
    <circle cx="1145" cy="420" r="4"/>
    <circle cx="1200" cy="430" r="4"/>
    <circle cx="1100" cy="440" r="4"/>
    <circle cx="1260" cy="420" r="4"/>
    <circle cx="1090" cy="380" r="4"/>
    <!-- cluster 3 synthetic — heavy supplementation of the minority -->
    <circle cx="730" cy="630" r="4"/>
    <circle cx="820" cy="640" r="4"/>
    <circle cx="740" cy="680" r="4"/>
    <circle cx="810" cy="710" r="4"/>
    <circle cx="770" cy="730" r="4"/>
    <circle cx="710" cy="670" r="4"/>
    <circle cx="850" cy="690" r="4"/>
    <circle cx="690" cy="700" r="4"/>
    <circle cx="830" cy="730" r="4"/>
  </g>

  <!-- Tiny annotations -->
  <g font-family="'Times New Roman', 'Noto Serif JP', serif" font-size="22" font-style="italic" fill="#6B6B66">
    <text x="320" y="220" opacity="0.75">majority cluster</text>
    <text x="1080" y="320" opacity="0.75">majority cluster</text>
    <text x="660" y="580" fill="#7A5A2C" opacity="0.85">minority — synthesized</text>
  </g>

  <!-- Legend (small) -->
  <g font-family="'Times New Roman', 'Noto Serif JP', serif" font-size="18" fill="#2B2B28" opacity="0.8">
    <circle cx="120" cy="820" r="5" fill="#2B2B28"/>
    <text x="135" y="826">real</text>
    <circle cx="220" cy="820" r="4" fill="#D49F4C"/>
    <text x="235" y="826" fill="#7A5A2C">synthetic</text>
  </g>

  <!-- Subtle vignette -->
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
