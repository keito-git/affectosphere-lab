<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1600" height="900" fill="#FAF6EC"/>

  <!-- World map simplified outlines (very abstract) -->
  <!-- Americas -->
  <path d="M 220 200 Q 260 180 280 220 Q 300 260 290 320 Q 280 380 260 420 Q 240 460 220 440 Q 200 420 210 380 Q 220 340 215 300 Q 205 250 220 200Z" fill="#E8E0D0" opacity="0.5"/>
  <!-- Europe/Africa -->
  <path d="M 660 180 Q 720 170 740 200 Q 760 230 750 270 Q 740 310 720 350 Q 700 390 680 420 Q 660 450 640 430 Q 620 410 630 370 Q 640 330 635 290 Q 625 240 660 180Z" fill="#E8E0D0" opacity="0.5"/>
  <!-- Asia -->
  <path d="M 980 160 Q 1100 150 1140 190 Q 1160 210 1150 250 Q 1140 290 1100 320 Q 1060 350 1020 360 Q 980 370 960 340 Q 940 310 945 270 Q 950 230 965 195 Q 970 170 980 160Z" fill="#E8E0D0" opacity="0.5"/>

  <!-- Knowledge graph nodes: cultural clusters -->
  <!-- Center hub -->
  <circle cx="800" cy="460" r="55" fill="#3D3530" opacity="0.85"/>
  <text x="800" y="452" text-anchor="middle" fill="#FDFAF4" font-family="Georgia, serif" font-size="13">Cultural</text>
  <text x="800" y="470" text-anchor="middle" fill="#D4A94A" font-family="Georgia, serif" font-size="13">Knowledge</text>
  <text x="800" y="488" text-anchor="middle" fill="#D4A94A" font-family="Georgia, serif" font-size="13">Graph</text>

  <!-- Cultural node: East Asia -->
  <circle cx="480" cy="300" r="42" fill="#D4A94A" opacity="0.75"/>
  <text x="480" y="294" text-anchor="middle" fill="#1E1816" font-family="Georgia, serif" font-size="12">East Asia</text>
  <text x="480" y="312" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="10">間接表現</text>

  <!-- Cultural node: Western -->
  <circle cx="1120" cy="300" r="42" fill="#D4A94A" opacity="0.75"/>
  <text x="1120" y="294" text-anchor="middle" fill="#1E1816" font-family="Georgia, serif" font-size="12">Western</text>
  <text x="1120" y="312" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="10">Direct</text>

  <!-- Cultural node: South Asia -->
  <circle cx="480" cy="620" r="38" fill="#B88A30" opacity="0.65"/>
  <text x="480" y="614" text-anchor="middle" fill="#1E1816" font-family="Georgia, serif" font-size="12">South Asia</text>
  <text x="480" y="632" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="10">Contextual</text>

  <!-- Cultural node: Middle East -->
  <circle cx="1120" cy="620" r="38" fill="#B88A30" opacity="0.65"/>
  <text x="1120" y="614" text-anchor="middle" fill="#1E1816" font-family="Georgia, serif" font-size="12">Middle East</text>
  <text x="1120" y="632" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="10">Expressive</text>

  <!-- Additional node: Latin America -->
  <circle cx="300" cy="480" r="32" fill="#D4C8B8" opacity="0.7"/>
  <text x="300" y="474" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="11">Latin</text>
  <text x="300" y="490" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="11">America</text>

  <!-- Additional node: Nordic -->
  <circle cx="1300" cy="480" r="32" fill="#D4C8B8" opacity="0.7"/>
  <text x="1300" y="474" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="11">Nordic</text>
  <text x="1300" y="490" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="11">Low-key</text>

  <!-- Edges from center to cultural nodes -->
  <line x1="750" y1="430" x2="520" y2="330" stroke="#7A6A5A" stroke-width="2" opacity="0.6"/>
  <line x1="850" y1="430" x2="1080" y2="330" stroke="#7A6A5A" stroke-width="2" opacity="0.6"/>
  <line x1="750" y1="490" x2="516" y2="600" stroke="#7A6A5A" stroke-width="2" opacity="0.6"/>
  <line x1="850" y1="490" x2="1082" y2="600" stroke="#7A6A5A" stroke-width="2" opacity="0.6"/>
  <line x1="748" y1="460" x2="332" y2="470" stroke="#7A6A5A" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>
  <line x1="855" y1="460" x2="1268" y2="470" stroke="#7A6A5A" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>

  <!-- Cross-cultural edges -->
  <path d="M 520 280 Q 800 200 1082 280" fill="none" stroke="#D4A94A" stroke-width="1.2" opacity="0.35" stroke-dasharray="6,4"/>
  <path d="M 518 638 Q 800 720 1084 638" fill="none" stroke="#D4A94A" stroke-width="1.2" opacity="0.35" stroke-dasharray="6,4"/>

  <!-- VAD annotation labels on edges -->
  <text x="640" y="365" fill="#B88A30" font-family="Georgia, serif" font-size="12" opacity="0.7" font-style="italic">V: 0.3, A: 0.7</text>
  <text x="920" y="365" fill="#B88A30" font-family="Georgia, serif" font-size="12" opacity="0.7" font-style="italic">V: 0.8, A: 0.8</text>

  <!-- Bias reduction callout -->
  <rect x="1350" y="130" width="200" height="80" rx="8" fill="#3D3530" opacity="0.85"/>
  <text x="1450" y="162" text-anchor="middle" fill="#D4A94A" font-family="Georgia, serif" font-size="26" font-weight="bold">−61%</text>
  <text x="1450" y="185" text-anchor="middle" fill="#FDFAF4" font-family="Georgia, serif" font-size="12">cultural bias</text>
  <text x="1450" y="200" text-anchor="middle" fill="#D4C8B8" font-family="Georgia, serif" font-size="11">reduced</text>

  <!-- Score callout -->
  <rect x="50" y="130" width="200" height="80" rx="8" fill="#D4A94A" opacity="0.75"/>
  <text x="150" y="162" text-anchor="middle" fill="#1E1816" font-family="Georgia, serif" font-size="24" font-weight="bold">9.32/10</text>
  <text x="150" y="185" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="12">Cultural Semantic</text>
  <text x="150" y="200" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="11">Density Score</text>

  <!-- Title -->
  <text x="800" y="72" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="30" font-weight="bold" opacity="0.85">Affective-CARA</text>
  <text x="800" y="108" text-anchor="middle" fill="#7A6A5A" font-family="Georgia, serif" font-size="17" opacity="0.7">Culturally Adaptive Emotional Intelligence via Knowledge Graph</text>

  <!-- Bottom label -->
  <text x="800" y="862" text-anchor="middle" fill="#7A6A5A" font-family="Georgia, serif" font-size="13" opacity="0.6">Affectosphere Group</text>
</svg>
