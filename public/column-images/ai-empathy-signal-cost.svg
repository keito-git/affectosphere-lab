<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Background: warm ivory -->
  <rect width="1600" height="900" fill="#FDFAF4"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#EDE8DC" stroke-width="0.8"/>
    </pattern>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A76A;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#D4A76A;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3D3830;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#3D3830;stop-opacity:0.20"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Left panel: emotional waveform area -->
  <rect x="80" y="120" width="560" height="660" rx="16" fill="url(#leftGrad)" stroke="#D4A76A" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Right panel: cost/formula area -->
  <rect x="960" y="120" width="560" height="660" rx="16" fill="url(#rightGrad)" stroke="#3D3830" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Center balance beam -->
  <!-- Vertical pole -->
  <rect x="790" y="300" width="20" height="420" rx="4" fill="#3D3830" opacity="0.7"/>
  <!-- Horizontal beam -->
  <rect x="540" y="295" width="520" height="16" rx="8" fill="#3D3830" opacity="0.7"/>
  <!-- Base -->
  <ellipse cx="800" cy="730" rx="120" ry="20" fill="#3D3830" opacity="0.25"/>
  <rect x="760" y="718" width="80" height="18" rx="4" fill="#3D3830" opacity="0.4"/>

  <!-- Left pan -->
  <line x1="548" y1="311" x2="620" y2="400" stroke="#3D3830" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="548" y1="311" x2="476" y2="400" stroke="#3D3830" stroke-width="2" stroke-opacity="0.6"/>
  <rect x="440" y="395" width="220" height="80" rx="12" fill="#F5E6C8" stroke="#D4A76A" stroke-width="2"/>

  <!-- Right pan -->
  <line x1="1052" y1="311" x2="1124" y2="395" stroke="#3D3830" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="1052" y1="311" x2="980" y2="395" stroke="#3D3830" stroke-width="2" stroke-opacity="0.6"/>
  <rect x="940" y="390" width="220" height="80" rx="12" fill="#E8E0D0" stroke="#3D3830" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Emotional waveform in left panel -->
  <polyline points="100,480 140,440 180,500 220,420 260,510 300,430 340,490 380,445 420,505 460,435 500,480 540,460 580,480 620,455" fill="none" stroke="#D4A76A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <polyline points="100,560 140,530 180,575 220,520 260,580 300,525 340,565 380,530 420,570 460,525 500,555 540,540 580,560 620,535" fill="none" stroke="#D4A76A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Three empathy dots on left -->
  <circle cx="200" cy="620" r="22" fill="#D4A76A" opacity="0.85"/>
  <circle cx="360" cy="620" r="22" fill="#D4A76A" opacity="0.6"/>
  <circle cx="520" cy="620" r="22" fill="#D4A76A" opacity="0.4"/>

  <!-- Formula elements on right -->
  <!-- C(context) -->
  <text x="1000" y="480" font-family="Georgia, serif" font-size="44" fill="#3D3830" opacity="0.75">C(context)</text>
  <!-- Cost axis arrow -->
  <line x1="1000" y1="530" x2="1480" y2="530" stroke="#3D3830" stroke-width="2" stroke-opacity="0.4"/>
  <polygon points="1485,530 1470,524 1470,536" fill="#3D3830" opacity="0.4"/>
  <!-- Signal bars -->
  <rect x="1020" y="555" width="30" height="60" rx="4" fill="#3D3830" opacity="0.2"/>
  <rect x="1070" y="530" width="30" height="85" rx="4" fill="#3D3830" opacity="0.35"/>
  <rect x="1120" y="510" width="30" height="105" rx="4" fill="#3D3830" opacity="0.5"/>
  <rect x="1170" y="485" width="30" height="130" rx="4" fill="#3D3830" opacity="0.65"/>
  <rect x="1220" y="505" width="30" height="110" rx="4" fill="#3D3830" opacity="0.5"/>
  <rect x="1270" y="525" width="30" height="90" rx="4" fill="#3D3830" opacity="0.35"/>

  <!-- Left pan label: Empathy Expression -->
  <text x="550" y="444" font-family="Georgia, serif" font-size="18" fill="#3D3830" opacity="0.7" text-anchor="middle">Empathy</text>

  <!-- Right pan label: Context Cost -->
  <text x="1050" y="440" font-family="Georgia, serif" font-size="18" fill="#3D3830" opacity="0.7" text-anchor="middle">Context</text>

  <!-- Center balance symbol -->
  <text x="800" y="285" font-family="Georgia, serif" font-size="56" fill="#3D3830" opacity="0.55" text-anchor="middle">≈</text>

  <!-- Title area -->
  <text x="800" y="90" font-family="Georgia, serif" font-size="32" fill="#3D3830" opacity="0.55" text-anchor="middle" letter-spacing="4">SIGNAL · COST · EMPATHY</text>

  <!-- Three dimension labels bottom left -->
  <text x="148" y="666" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.7" text-anchor="middle">Affective</text>
  <text x="308" y="666" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.7" text-anchor="middle">Cognitive</text>
  <text x="468" y="666" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.7" text-anchor="middle">Associative</text>

  <!-- Decorative corner lines -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#D4A76A" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="80" x2="80" y2="160" stroke="#D4A76A" stroke-width="1.5" opacity="0.4"/>
  <line x1="1520" y1="820" x2="1400" y2="820" stroke="#D4A76A" stroke-width="1.5" opacity="0.4"/>
  <line x1="1520" y1="820" x2="1520" y2="740" stroke="#D4A76A" stroke-width="1.5" opacity="0.4"/>
</svg>
