<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Background: ivory -->
  <rect width="1600" height="900" fill="#F6F2EA"/>

  <defs>
    <pattern id="grid-cl" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#E4DECE" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A76A;stop-opacity:0.12"/>
      <stop offset="50%" style="stop-color:#D4A76A;stop-opacity:0.28"/>
      <stop offset="100%" style="stop-color:#3D3830;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#grid-cl)"/>

  <!-- Title -->
  <text x="800" y="72" font-family="Georgia, serif" font-size="24" fill="#3D3830" opacity="0.35" text-anchor="middle" letter-spacing="2">NLP PIPELINE · CURRICULUM–LABOR MARKET GAP QUANTIFICATION</text>

  <!-- Pipeline flow band -->
  <rect x="80" y="380" width="1440" height="110" rx="55" fill="url(#pipeGrad)" opacity="0.4"/>

  <!-- Stage 1: Documents -->
  <rect x="100" y="170" width="260" height="360" rx="14" fill="#F2EDE0" stroke="#D4A76A" stroke-width="1.5" opacity="0.8"/>
  <text x="230" y="210" font-family="Georgia, serif" font-size="16" fill="#3D3830" opacity="0.7" text-anchor="middle">Input Documents</text>
  <line x1="115" y1="222" x2="345" y2="222" stroke="#E4DECE" stroke-width="1" opacity="0.7"/>
  <!-- Curriculum doc -->
  <rect x="120" y="238" width="220" height="110" rx="8" fill="#EDE8DC" stroke="#D4A76A" stroke-width="1" opacity="0.65"/>
  <text x="230" y="265" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.6" text-anchor="middle">Curriculum</text>
  <text x="230" y="283" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.5" text-anchor="middle">85 courses</text>
  <text x="230" y="301" font-family="Georgia, serif" font-size="11" fill="#3D3830" opacity="0.4" text-anchor="middle">(syllabi / training catalog)</text>
  <text x="230" y="335" font-family="Georgia, serif" font-size="11" fill="#D4A76A" opacity="0.6" text-anchor="middle">Supply side</text>
  <!-- Job posting doc -->
  <rect x="120" y="368" width="220" height="110" rx="8" fill="#EDE8DC" stroke="#3D3830" stroke-width="1" opacity="0.5"/>
  <text x="230" y="395" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.6" text-anchor="middle">Job Postings / JDs</text>
  <text x="230" y="413" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.5" text-anchor="middle">30 postings</text>
  <text x="230" y="431" font-family="Georgia, serif" font-size="11" fill="#3D3830" opacity="0.4" text-anchor="middle">(requirements / skills)</text>
  <text x="230" y="465" font-family="Georgia, serif" font-size="11" fill="#3D3830" opacity="0.5" text-anchor="middle">Demand side</text>

  <!-- Arrow 1 -->
  <line x1="365" y1="435" x2="480" y2="435" stroke="#D4A76A" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <polygon points="487,435 473,428 473,442" fill="#D4A76A" opacity="0.7"/>
  <text x="425" y="413" font-family="Georgia, serif" font-size="11" fill="#3D3830" opacity="0.45" text-anchor="middle">schema-constrained</text>

  <!-- Stage 2: LLM Extraction -->
  <rect x="490" y="210" width="250" height="280" rx="14" fill="#F2EDE0" stroke="#D4A76A" stroke-width="1.5" opacity="0.8"/>
  <text x="615" y="248" font-family="Georgia, serif" font-size="16" fill="#3D3830" opacity="0.7" text-anchor="middle">LLM Extraction</text>
  <line x1="505" y1="260" x2="725" y2="260" stroke="#E4DECE" stroke-width="1" opacity="0.7"/>
  <text x="615" y="290" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.6" text-anchor="middle">GPT-4o / Gemini</text>
  <rect x="510" y="308" width="210" height="32" rx="8" fill="#D4A76A" opacity="0.18"/>
  <text x="615" y="329" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.65" text-anchor="middle">400 competencies</text>
  <rect x="510" y="352" width="210" height="32" rx="8" fill="#3D3830" opacity="0.08"/>
  <text x="615" y="373" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.6" text-anchor="middle">100% schema compliance</text>
  <rect x="510" y="396" width="210" height="32" rx="8" fill="#3D3830" opacity="0.08"/>
  <text x="615" y="417" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.6" text-anchor="middle">kappa = 0.79</text>

  <!-- Arrow 2 -->
  <line x1="745" y1="435" x2="855" y2="435" stroke="#D4A76A" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <polygon points="862,435 848,428 848,442" fill="#D4A76A" opacity="0.7"/>
  <text x="800" y="413" font-family="Georgia, serif" font-size="11" fill="#3D3830" opacity="0.45" text-anchor="middle">ESCO mapping</text>

  <!-- Stage 3: ESCO Matching -->
  <rect x="865" y="210" width="250" height="280" rx="14" fill="#F2EDE0" stroke="#D4A76A" stroke-width="1.5" opacity="0.8"/>
  <text x="990" y="248" font-family="Georgia, serif" font-size="16" fill="#3D3830" opacity="0.7" text-anchor="middle">ESCO Matching</text>
  <line x1="880" y1="260" x2="1100" y2="260" stroke="#E4DECE" stroke-width="1" opacity="0.7"/>
  <text x="990" y="290" font-family="Georgia, serif" font-size="13" fill="#D4A76A" opacity="0.7" text-anchor="middle">EU Standard Taxonomy</text>
  <text x="990" y="318" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.55" text-anchor="middle">Semantic embedding</text>
  <text x="990" y="344" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.55" text-anchor="middle">Cross-domain comparable</text>
  <text x="990" y="380" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.5" text-anchor="middle">Supply ↔ Demand</text>
  <text x="990" y="404" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.5" text-anchor="middle">unified reference</text>

  <!-- Arrow 3 -->
  <line x1="1120" y1="435" x2="1220" y2="435" stroke="#D4A76A" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <polygon points="1227,435 1213,428 1213,442" fill="#D4A76A" opacity="0.7"/>
  <text x="1172" y="413" font-family="Georgia, serif" font-size="11" fill="#3D3830" opacity="0.45" text-anchor="middle">gap analysis</text>

  <!-- Stage 4: Gap Output -->
  <rect x="1230" y="160" width="290" height="440" rx="14" fill="#EDE8DC" stroke="#D4A76A" stroke-width="1.5" opacity="0.8"/>
  <text x="1375" y="200" font-family="Georgia, serif" font-size="16" fill="#3D3830" opacity="0.7" text-anchor="middle">Gap Output</text>
  <line x1="1248" y1="212" x2="1502" y2="212" stroke="#E4DECE" stroke-width="1" opacity="0.7"/>

  <!-- Gap bars -->
  <!-- Generic Skills 25% -->
  <text x="1255" y="248" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.6">Generic Skills</text>
  <rect x="1255" y="254" width="200" height="16" rx="4" fill="#E4DECE" opacity="0.6"/>
  <rect x="1255" y="254" width="50" height="16" rx="4" fill="#D4A76A" opacity="0.7"/>
  <text x="1462" y="267" font-family="Georgia, serif" font-size="11" fill="#D4A76A" opacity="0.8">25%</text>

  <!-- Algorithm Theory 13.8% -->
  <text x="1255" y="292" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.6">Algorithm Theory</text>
  <rect x="1255" y="298" width="200" height="16" rx="4" fill="#E4DECE" opacity="0.6"/>
  <rect x="1255" y="298" width="28" height="16" rx="4" fill="#D4A76A" opacity="0.55"/>
  <text x="1462" y="311" font-family="Georgia, serif" font-size="11" fill="#D4A76A" opacity="0.7">13.8%</text>

  <!-- AI Skills ~small -->
  <text x="1255" y="336" font-family="Georgia, serif" font-size="12" fill="#3D3830" opacity="0.6">AI/ML Skills</text>
  <rect x="1255" y="342" width="200" height="16" rx="4" fill="#E4DECE" opacity="0.6"/>
  <rect x="1255" y="342" width="14" height="16" rx="4" fill="#3D3830" opacity="0.35"/>
  <text x="1462" y="355" font-family="Georgia, serif" font-size="11" fill="#3D3830" opacity="0.5">small</text>

  <line x1="1248" y1="378" x2="1502" y2="378" stroke="#E4DECE" stroke-width="1" opacity="0.5"/>

  <text x="1375" y="410" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.55" text-anchor="middle">→ Training priority</text>
  <text x="1375" y="434" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.55" text-anchor="middle">→ Hire vs. build</text>
  <text x="1375" y="458" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.55" text-anchor="middle">→ Budget allocation</text>
  <text x="1375" y="488" font-family="Georgia, serif" font-size="12" fill="#D4A76A" opacity="0.6" text-anchor="middle">arXiv:2606.01982</text>

  <!-- Bottom caption -->
  <text x="800" y="845" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.35" text-anchor="middle">Quantifying the drift between what we teach and what we need — objectively, at scale.</text>

  <!-- Decorative corners -->
  <path d="M 60 60 L 140 60 L 140 100" fill="none" stroke="#D4A76A" stroke-width="2" opacity="0.4"/>
  <path d="M 1540 840 L 1460 840 L 1460 800" fill="none" stroke="#D4A76A" stroke-width="2" opacity="0.4"/>
</svg>
