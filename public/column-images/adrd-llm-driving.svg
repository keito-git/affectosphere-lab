<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1600" height="900" fill="#F9F5ED"/>

  <!-- Road perspective lines -->
  <path d="M 800 900 L 400 400 L 1200 400" fill="none" stroke="#E0D6C4" stroke-width="2" opacity="0.4"/>
  <path d="M 800 900 L 500 450 L 1100 450" fill="none" stroke="#E0D6C4" stroke-width="1.5" opacity="0.3"/>
  <path d="M 800 900 L 200 350 L 1400 350" fill="none" stroke="#E0D6C4" stroke-width="1" opacity="0.2"/>

  <!-- Road surface -->
  <polygon points="550,900 800,380 1050,900" fill="#D4C8B8" opacity="0.25"/>

  <!-- Center dashed lane marker -->
  <line x1="800" y1="900" x2="800" y2="380" stroke="#FDFAF4" stroke-width="3" stroke-dasharray="20,15" opacity="0.6"/>

  <!-- Car body (top view, simple) -->
  <rect x="745" y="700" width="110" height="160" rx="12" fill="#3D3530" opacity="0.85"/>
  <rect x="760" y="715" width="80" height="50" rx="6" fill="#7A6A5A" opacity="0.5"/>
  <!-- Wheels -->
  <rect x="738" y="710" width="16" height="30" rx="4" fill="#1E1816" opacity="0.7"/>
  <rect x="846" y="710" width="16" height="30" rx="4" fill="#1E1816" opacity="0.7"/>
  <rect x="738" y="810" width="16" height="30" rx="4" fill="#1E1816" opacity="0.7"/>
  <rect x="846" y="810" width="16" height="30" rx="4" fill="#1E1816" opacity="0.7"/>

  <!-- Left panel: Rule-based system -->
  <rect x="60" y="200" width="380" height="420" rx="10" fill="#FDFAF4" stroke="#D4C8B8" stroke-width="1.5" opacity="0.95"/>
  <text x="250" y="234" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="16" font-weight="bold">Rule-Based System</text>

  <!-- Flowchart nodes in left panel -->
  <rect x="110" y="255" width="280" height="38" rx="5" fill="#D4A94A" opacity="0.3" stroke="#D4A94A" stroke-width="1"/>
  <text x="250" y="278" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="13">Speed limit check</text>

  <rect x="110" y="310" width="280" height="38" rx="5" fill="#D4A94A" opacity="0.3" stroke="#D4A94A" stroke-width="1"/>
  <text x="250" y="333" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="13">Collision avoidance rule</text>

  <rect x="110" y="365" width="280" height="38" rx="5" fill="#D4A94A" opacity="0.3" stroke="#D4A94A" stroke-width="1"/>
  <text x="250" y="388" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="13">Lane change safety check</text>

  <rect x="110" y="420" width="280" height="38" rx="5" fill="#D4A94A" opacity="0.3" stroke="#D4A94A" stroke-width="1"/>
  <text x="250" y="443" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="13">Traffic signal compliance</text>

  <line x1="250" y1="293" x2="250" y2="310" stroke="#7A6A5A" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="348" x2="250" y2="365" stroke="#7A6A5A" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="403" x2="250" y2="420" stroke="#7A6A5A" stroke-width="1.5" opacity="0.6"/>

  <text x="250" y="495" text-anchor="middle" fill="#7A6A5A" font-family="Georgia, serif" font-size="13" font-style="italic">Certainty + Explainability</text>
  <text x="250" y="555" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="12" opacity="0.6">Handles standard cases</text>
  <text x="250" y="575" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="12" opacity="0.6">instantly and safely</text>

  <!-- Right panel: LLM Agent -->
  <rect x="1160" y="200" width="380" height="420" rx="10" fill="#FDFAF4" stroke="#D4C8B8" stroke-width="1.5" opacity="0.95"/>
  <text x="1350" y="234" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="16" font-weight="bold">LLM Agent Module</text>

  <!-- Thought bubbles in right panel -->
  <ellipse cx="1350" cy="285" rx="130" ry="28" fill="#3D3530" opacity="0.12" stroke="#3D3530" stroke-width="1"/>
  <text x="1350" y="290" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="12">"Pedestrian hesitating?"</text>

  <ellipse cx="1350" cy="345" rx="130" ry="28" fill="#3D3530" opacity="0.12" stroke="#3D3530" stroke-width="1"/>
  <text x="1350" y="350" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="12">"Merge or yield first?"</text>

  <ellipse cx="1350" cy="405" rx="130" ry="28" fill="#3D3530" opacity="0.12" stroke="#3D3530" stroke-width="1"/>
  <text x="1350" y="410" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="12">"Weather impact on road?"</text>

  <ellipse cx="1350" cy="465" rx="130" ry="28" fill="#3D3530" opacity="0.12" stroke="#3D3530" stroke-width="1"/>
  <text x="1350" y="470" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="12">"Unusual driving pattern?"</text>

  <text x="1350" y="525" text-anchor="middle" fill="#7A6A5A" font-family="Georgia, serif" font-size="13" font-style="italic">Flexibility + Reasoning</text>
  <text x="1350" y="565" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="12" opacity="0.6">Handles edge cases and</text>
  <text x="1350" y="585" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="12" opacity="0.6">complex contexts</text>

  <!-- Center integration arrow: left to center -->
  <path d="M 440 460 Q 580 550 720 680" fill="none" stroke="#D4A94A" stroke-width="2.5" opacity="0.7" stroke-dasharray="8,4"/>
  <polygon points="720,680 702,665 726,665" fill="#D4A94A" opacity="0.7"/>

  <!-- Center integration arrow: right to center -->
  <path d="M 1160 460 Q 1020 550 880 680" fill="none" stroke="#D4A94A" stroke-width="2.5" opacity="0.7" stroke-dasharray="8,4"/>
  <polygon points="880,680 862,665 886,665" fill="#D4A94A" opacity="0.7"/>

  <!-- ADRD Integration label at car -->
  <rect x="680" y="640" width="240" height="36" rx="6" fill="#3D3530" opacity="0.85"/>
  <text x="800" y="663" text-anchor="middle" fill="#D4A94A" font-family="Georgia, serif" font-size="14" font-weight="bold">ADRD Integration</text>

  <!-- Title -->
  <text x="800" y="68" text-anchor="middle" fill="#3D3530" font-family="Georgia, serif" font-size="32" font-weight="bold" opacity="0.85">ADRD: Rules + LLM for Autonomous Driving</text>
  <text x="800" y="104" text-anchor="middle" fill="#7A6A5A" font-family="Georgia, serif" font-size="17" opacity="0.7">Interpretability · Speed · Performance — simultaneously</text>

  <!-- Bottom label -->
  <text x="800" y="862" text-anchor="middle" fill="#7A6A5A" font-family="Georgia, serif" font-size="13" opacity="0.6">Affectosphere Group</text>
</svg>
