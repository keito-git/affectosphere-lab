<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Background: cream -->
  <rect width="1600" height="900" fill="#F6F2EA"/>

  <defs>
    <pattern id="grid-wp" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#E4DECE" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A76A;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#D4A76A;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="barGradNeg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D3830;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#3D3830;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#grid-wp)"/>

  <!-- Title area -->
  <text x="800" y="72" font-family="Georgia, serif" font-size="26" fill="#3D3830" opacity="0.35" text-anchor="middle" letter-spacing="2">AI COMPETENCY × PROACTIVITY · WORKPLACE SOCIAL PERCEPTION</text>

  <!-- 2x2 Matrix -->
  <!-- Matrix frame -->
  <rect x="200" y="130" width="800" height="620" rx="12" fill="#F2EDE0" stroke="#E4DECE" stroke-width="1.5" opacity="0.7"/>

  <!-- Axis labels -->
  <text x="600" y="118" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.55" text-anchor="middle">AI Proactivity</text>
  <text x="186" y="445" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.55" text-anchor="middle" transform="rotate(-90,186,445)">AI Competency</text>

  <!-- Column headers -->
  <text x="400" y="158" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.5" text-anchor="middle">Low Proactivity</text>
  <text x="800" y="158" font-family="Georgia, serif" font-size="14" fill="#3D3830" opacity="0.5" text-anchor="middle">High Proactivity</text>

  <!-- Row headers -->
  <text x="218" y="310" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.5" text-anchor="middle" transform="rotate(-90,218,310)">Low Competency</text>
  <text x="218" y="590" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.5" text-anchor="middle" transform="rotate(-90,218,590)">High Competency</text>

  <!-- Dividers -->
  <line x1="600" y1="140" x2="600" y2="740" stroke="#E4DECE" stroke-width="1.5" opacity="0.8"/>
  <line x1="210" y1="440" x2="990" y2="440" stroke="#E4DECE" stroke-width="1.5" opacity="0.8"/>

  <!-- Cell 1: Low/Low — Best outcome (amber glow) -->
  <rect x="210" y="150" width="380" height="280" rx="8" fill="#D4A76A" opacity="0.12"/>
  <text x="400" y="250" font-family="Georgia, serif" font-size="18" fill="#3D3830" opacity="0.7" text-anchor="middle">Ownership: High</text>
  <text x="400" y="278" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.6" text-anchor="middle">Meaning: Preserved</text>
  <text x="400" y="304" font-family="Georgia, serif" font-size="15" fill="#D4A76A" opacity="0.8" text-anchor="middle">Team Dynamics: Stable</text>
  <rect x="330" y="325" width="140" height="30" rx="8" fill="#D4A76A" opacity="0.25"/>
  <text x="400" y="345" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.7" text-anchor="middle">Best Outcome</text>

  <!-- Cell 2: Low/High — Mixed -->
  <rect x="610" y="150" width="370" height="280" rx="8" fill="#3D3830" opacity="0.04"/>
  <text x="795" y="250" font-family="Georgia, serif" font-size="18" fill="#3D3830" opacity="0.6" text-anchor="middle">Ownership: Mixed</text>
  <text x="795" y="278" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.5" text-anchor="middle">Meaning: Slightly eroded</text>
  <text x="795" y="304" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.5" text-anchor="middle">Team Dynamics: Tension</text>

  <!-- Cell 3: High/Low — Moderate -->
  <rect x="210" y="450" width="380" height="280" rx="8" fill="#3D3830" opacity="0.04"/>
  <text x="400" y="550" font-family="Georgia, serif" font-size="18" fill="#3D3830" opacity="0.6" text-anchor="middle">Ownership: Reduced</text>
  <text x="400" y="578" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.5" text-anchor="middle">Meaning: At risk</text>
  <text x="400" y="604" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.5" text-anchor="middle">Identity: Challenged</text>

  <!-- Cell 4: High/High — Worst (dark) -->
  <rect x="610" y="450" width="370" height="280" rx="8" fill="#3D3830" opacity="0.10"/>
  <text x="795" y="540" font-family="Georgia, serif" font-size="18" fill="#3D3830" opacity="0.7" text-anchor="middle">Ownership: Low</text>
  <text x="795" y="568" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.6" text-anchor="middle">Meaning: Eroded</text>
  <text x="795" y="594" font-family="Georgia, serif" font-size="15" fill="#3D3830" opacity="0.6" text-anchor="middle">Team Dynamics: Disrupted</text>
  <rect x="720" y="620" width="150" height="30" rx="8" fill="#3D3830" opacity="0.18"/>
  <text x="795" y="640" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.7" text-anchor="middle">Worst Outcome</text>

  <!-- Right panel: Design implication -->
  <rect x="1050" y="130" width="460" height="620" rx="12" fill="#EDE8DC" stroke="#D4A76A" stroke-width="1.5" opacity="0.7"/>
  <text x="1280" y="170" font-family="Georgia, serif" font-size="17" fill="#3D3830" opacity="0.7" text-anchor="middle">Design Implication</text>
  <line x1="1068" y1="185" x2="1492" y2="185" stroke="#D4A76A" stroke-width="1" opacity="0.4"/>

  <text x="1280" y="220" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.6" text-anchor="middle">Calibrate proactivity</text>
  <text x="1280" y="238" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.6" text-anchor="middle">by role &amp; seniority</text>

  <rect x="1075" y="255" width="410" height="2" rx="1" fill="#D4A76A" opacity="0.25"/>

  <text x="1280" y="290" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.6" text-anchor="middle">Human decides</text>
  <text x="1280" y="308" font-family="Georgia, serif" font-size="13" fill="#D4A76A" opacity="0.7" text-anchor="middle">AI supports</text>

  <rect x="1075" y="330" width="410" height="2" rx="1" fill="#D4A76A" opacity="0.25"/>

  <text x="1280" y="365" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.6" text-anchor="middle">Measure job satisfaction</text>
  <text x="1280" y="383" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.6" text-anchor="middle">alongside efficiency</text>

  <rect x="1075" y="405" width="410" height="2" rx="1" fill="#D4A76A" opacity="0.25"/>

  <text x="1280" y="445" font-family="Georgia, serif" font-size="14" fill="#D4A76A" opacity="0.75" text-anchor="middle">n = 50 participants</text>
  <text x="1280" y="467" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.5" text-anchor="middle">arXiv:2606.00182</text>

  <!-- Bottom note -->
  <text x="800" y="845" font-family="Georgia, serif" font-size="13" fill="#3D3830" opacity="0.35" text-anchor="middle">Performance metrics alone cannot capture AI's effect on human identity at work.</text>

  <!-- Decorative corners -->
  <path d="M 60 60 L 140 60 L 140 100" fill="none" stroke="#D4A76A" stroke-width="2" opacity="0.4"/>
  <path d="M 1540 840 L 1460 840 L 1460 800" fill="none" stroke="#D4A76A" stroke-width="2" opacity="0.4"/>
</svg>
