<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <!--
      This file exists solely so that Netlify's post-processing form detector
      can register the forms used by the site. The visible forms live in
      src/pages/contact.astro and src/pages/ai-for-science.astro and post to
      Netlify Forms via data-netlify="true". This skeleton mirrors their
      fields so Netlify reliably registers the form names.
    -->

    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="affiliation" />
      <input type="email" name="email" />
      <select name="purpose">
        <option value="共同研究のご相談"></option>
      </select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <form name="ai-for-science" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="affiliation" />
      <input type="text" name="field" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <form name="en-contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="affiliation" />
      <input type="email" name="email" />
      <select name="purpose">
        <option value="Collaboration inquiry"></option>
      </select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <form name="en-ai-for-science" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="affiliation" />
      <input type="text" name="field" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
